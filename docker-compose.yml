# Деплой на VPS. Запуск:  docker compose up -d --build
#
# Перед первым запуском создайте рядом файл .env со значениями:
#   FOOTBALL_DATA_API_KEY=ваш_ключ   (необязательно — без него работают seed-данные)
#   CRON_SECRET=любая_случайная_строка
#
# SQLite-файл живёт в volume `db-data` (/data/prod.db) и переживает пересборку.

services:
  # Одноразовый сервис: создаёт схему в БД. Seed (демо-данные) заливается
  # ТОЛЬКО если нет ключа API — иначе фейковые seed-матчи (в т.ч. «живой»)
  # перебивают реальные данные, приходящие из синка.
  migrate:
    build:
      context: .
      target: builder
    environment:
      DATABASE_URL: "file:/data/prod.db"
      FOOTBALL_DATA_API_KEY: "${FOOTBALL_DATA_API_KEY:-}"
    volumes:
      - db-data:/data
    command: >
      sh -c "npx prisma db push --skip-generate &&
             if [ -n \"$$FOOTBALL_DATA_API_KEY\" ]; then
               echo '[migrate] ключ API есть — seed пропущен, данные придут из синка';
             else
               [ -f /data/.seeded ] || (npx tsx prisma/seed.ts && touch /data/.seeded);
             fi"
    restart: "no"

  # Само приложение (Next standalone).
  app:
    build:
      context: .
      target: runner
    environment:
      DATABASE_URL: "file:/data/prod.db"
      FOOTBALL_DATA_API_KEY: "${FOOTBALL_DATA_API_KEY:-}"
      CRON_SECRET: "${CRON_SECRET:-}"
    volumes:
      - db-data:/data
    ports:
      - "3000:3000" # HTTP наружу; reverse-proxy/TLS добавим позже
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # Cron-sidecar: дёргает /api/sync каждые 3 минуты (замена Vercel Cron).
  sync:
    image: curlimages/curl:latest
    depends_on:
      app:
        condition: service_started
    environment:
      CRON_SECRET: "${CRON_SECRET:-}"
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "[sync] sidecar started"
        while true; do
          code=$$(curl -s -o /tmp/resp -w '%{http_code}' -H "Authorization: Bearer $${CRON_SECRET}" http://app:3000/api/sync)
          echo "[sync $$(date -u +%H:%M:%SZ)] HTTP $$code $$(cat /tmp/resp 2>/dev/null)"
          # успех → ждём 3 мин; иначе (app ещё не поднялся / сбой) — повтор через 5 сек
          if [ "$$code" = "200" ]; then sleep 180; else sleep 5; fi
        done
    restart: unless-stopped

volumes:
  db-data:
